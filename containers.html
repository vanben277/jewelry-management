<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap + Normalize -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="shortcut icon" href="./assets/img/Icon.webp" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/grid.css">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/responsive.css">
    <link rel="stylesheet" href="./assets/css/containers.css">
    <link rel="stylesheet" href="./assets/icon/fontawesome-free-6.6.0-web/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/chatbot.css">
    <link rel="stylesheet" href="./assets/css/component/ResetBoostrap.css">
    <title>Sản phẩm</title>
</head>

<body>
    <div class="app">
        <div id="chatbot-placeholder"></div>
        <div id="header" class="header"></div>
        <div id="header_tablet" class="tablet__navbar"></div>
        <div class="grid wide banner">
            <div class="row">
                <div class="block-back">
                    <a href="./index.html" class="back-link"> Trang chủ </a>
                    <span>/</span>
                    <a href="./containers.html" class="current-link" aria-readonly="true"> Sản phẩm </a>
                </div>
                <img src="https://cdn.pnj.io/images/promo/235/1200x450-nhan-t01-25.jpg" width="100%" alt=""
                    class="bannerUrl">
            </div>
        </div>
    </div>
    <div class="grid wide container-item">

        <div class="row">
            <!-- Filter buttons for mobile/tablet -->
            <div class="mobile-filter-buttons">
                <button class="mobile-filter-btn" id="openFilterBtn">
                    <i class="fas fa-filter"></i>
                    Bộ lọc
                </button>
                <button class="mobile-filter-btn" id="openSortBtn">
                    <i class="fas fa-sort"></i>
                    Sắp xếp
                </button>
            </div>
        </div>


        <!-- Desktop filter form -->
        <div class="row">
            <form method="GET" action="" class="desktop-filter">
                <div class="filter">
                    <h3 class="filter-title">Bộ lọc</h3>
                    <div class="filter-group">
                        <select name="gold_type">
                            <option value="">Tuổi vàng</option>
                            <option value="10K">10K</option>
                            <option value="14K">14K</option>
                            <option value="18K">18K</option>
                            <option value="24K">24K</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <select name="price_range">
                            <option value="">Giá</option>
                            <option value="0-1000000">Dưới 1 triệu</option>
                            <option value="1000000-3000000">1 - 3 triệu</option>
                            <option value="3000000-5000000">3 - 5 triệu</option>
                            <option value="5000000-10000000">5 - 10 triệu</option>
                            <option value="10000000-999999999">Trên 10 triệu</option>
                        </select>
                    </div>
                </div>
                <div class="sort">
                    <h3 class="sort-title">Sắp xếp</h3>
                    <div class="filter-group">
                        <select name="filter_item">
                            <option value="newest">Sản phẩm mới nhất</option>
                            <option value="price_desc">Giá từ cao đến thấp</option>
                            <option value="price_asc">Giá từ thấp đến cao</option>
                        </select>
                    </div>
                </div>
            </form>

        </div>

        <!-- Overlay -->
        <div class="overlay" id="overlay"></div>

        <!-- Mobile Filter Panel -->
        <div class="mobile-panel" id="filterPanel">
            <div class="panel-header">
                <h3>Bộ lọc</h3>
                <button class="close-btn" id="closeFilterBtn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="panel-content">
                <div class="filter-section">
                    <label>Tuổi vàng</label>
                    <select name="gold_type_mobile">
                        <option value="">Chọn tuổi vàng</option>
                        <option value="10K">10K</option>
                        <option value="14K">14K</option>
                        <option value="18K">18K</option>
                        <option value="24K">24K</option>
                    </select>
                </div>
                <div class="filter-section">
                    <label>Giá</label>
                    <select name="price_range_mobile">
                        <option value="">Chọn khoảng giá</option>
                        <option value="0-1000000">Dưới 1 triệu</option>
                        <option value="1000000-3000000">1 - 3 triệu</option>
                        <option value="3000000-5000000">3 - 5 triệu</option>
                        <option value="5000000-10000000">5 - 10 triệu</option>
                        <option value="10000000-999999999">Trên 10 triệu</option>
                    </select>
                </div>
            </div>
            <div class="panel-footer">
                <button class="btn-reset">Đặt lại</button>
                <button class="btn-apply">Áp dụng</button>
            </div>
        </div>

        <!-- Mobile Sort Panel -->
        <div class="mobile-panel" id="sortPanel">
            <div class="panel-header">
                <h3>Sắp xếp</h3>
                <button class="close-btn" id="closeSortBtn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="panel-content">
                <div class="sort-options">
                    <label class="sort-option">
                        <input type="radio" name="sort_mobile" value="newest" checked>
                        <span>Sản phẩm mới nhất</span>
                    </label>
                    <label class="sort-option">
                        <input type="radio" name="sort_mobile" value="price_desc">
                        <span>Giá từ cao đến thấp</span>
                    </label>
                    <label class="sort-option">
                        <input type="radio" name="sort_mobile" value="price_asc">
                        <span>Giá từ thấp đến cao</span>
                    </label>
                </div>
            </div>
            <div class="panel-footer">
                <button class="btn-reset">Đặt lại</button>
                <button class="btn-apply">Áp dụng</button>
            </div>
        </div>

        <div id="container__newitem" class="row container__newitem m-16 m-32"></div>
        <!-- PHÂN TRANG -->
        <nav class="pagination-wrapper" aria-label="Page navigation">
            <ul class="pagination-list">
                <li class="pagination-item disabled"><span>&laquo;</span></li>
                <li class="pagination-item active"><span>1</span></li>
                <li class="pagination-item"><a href="#">2</a></li>
                <li class="pagination-item"><span>...</span></li>
                <li class="pagination-item"><a href="#">10</a></li>
                <li class="pagination-item"><a href="#">&raquo;</a></li>
            </ul>
        </nav>
    </div>
    <div id="footer"></div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/Search.js"></script>
    <script src="./assets/js/FilterOverlayContainers.js"></script>
    <script src="./assets/js/account-sync.js"></script>
    <script src="./assets/js/CartMini.js"></script>
    <script src="./assets/js/CartMiniUtils.js"></script>

    <script>
        $(document).ready(function () {
            const selectedCategory = JSON.parse(localStorage.getItem('selectedCategory') || '{}');

            // Lấy categoryId từ URL query string
            const urlParams = new URLSearchParams(window.location.search);
            const categoryId = urlParams.get('category');

            if (selectedCategory.name) {
                document.title = selectedCategory.name;
                $('.current-link').text(selectedCategory.name);
                $('.bannerUrl').attr('src', selectedCategory.bannerUrl || 'https://cdn.pnj.io/images/default-banner.jpg');
            } else {
                console.warn('Không có dữ liệu danh mục được chọn');
            }

            const searchQuery = urlParams.get('search') || '';
            if (searchQuery) {
                $('.outline-none').val(decodeURIComponent(searchQuery));
                determineCategoryFromSearch(searchQuery);
            } else {
                // Load với categoryId từ URL, không dùng getCurrentCategoryId()
                loadProductsWithCurrentFilters(0, categoryId);
                initGoldTypeFilter();
                syncFilters();
                handleMobileFilterApply();
                handleFilterReset();
            }
        });

        // Hàm xác định categoryId từ search query
        function determineCategoryFromSearch(searchQuery) {
            $.ajax({
                url: `http://localhost:8080/api/v1/product/search?name=${encodeURIComponent(searchQuery)}&pageNumber=0&pageSize=1`,
                method: 'GET',
                success: function (res) {
                    let categoryId = getCurrentCategoryId(); // Fallback categoryId
                    if (res.data && res.data.content && res.data.content.length > 0) {
                        // Lấy categoryId từ sản phẩm đầu tiên
                        categoryId = res.data.content[0].categoryId || categoryId;
                        // Cập nhật URL với categoryId mới
                        const urlParams = new URLSearchParams(window.location.search);
                        urlParams.set('categoryId', categoryId);
                        const newUrl = `${window.location.pathname.replace(/category\/\d+/, `category/${categoryId}`)}?${urlParams.toString()}`;
                        window.history.replaceState({}, '', newUrl);
                        // Cập nhật selectedCategory trong localStorage
                        localStorage.setItem('selectedCategory', JSON.stringify({
                            name: res.data.content[0].categoryName || 'Danh mục',
                            bannerUrl: res.data.content[0].categoryBannerUrl || 'https://cdn.pnj.io/images/default-banner.jpg'
                        }));
                        // Cập nhật UI
                        document.title = res.data.content[0].categoryName || 'Danh mục';
                        $('.current-link').text(res.data.content[0].categoryName || 'Danh mục');
                        $('.bannerUrl').attr('src', res.data.content[0].categoryBannerUrl || 'https://cdn.pnj.io/images/default-banner.jpg');
                    }
                    // Load sản phẩm với categoryId đã xác định
                    loadProductsWithCurrentFilters(0, categoryId);
                    initGoldTypeFilter();
                    syncFilters();
                    handleMobileFilterApply();
                    handleFilterReset();
                },
                error: function () {
                    console.error('Lỗi khi xác định danh mục từ search query');
                    // Fallback: load với categoryId mặc định
                    loadProductsWithCurrentFilters(0);
                    initGoldTypeFilter();
                    syncFilters();
                    handleMobileFilterApply();
                    handleFilterReset();
                }
            });
        }

        function syncFilters() {
            function syncDesktopToMobile() {
                const desktopGoldType = $('select[name="gold_type"]').val();
                const desktopPriceRange = $('select[name="price_range"]').val();
                const desktopSort = $('select[name="filter_item"]').val();

                $('select[name="gold_type_mobile"]').val(desktopGoldType);
                $('select[name="price_range_mobile"]').val(desktopPriceRange);
                $('input[name="sort_mobile"][value="' + desktopSort + '"]').prop('checked', true);
            }

            function syncMobileToDesktop() {
                const mobileGoldType = $('select[name="gold_type_mobile"]').val();
                const mobilePriceRange = $('select[name="price_range_mobile"]').val();
                const mobileSort = $('input[name="sort_mobile"]:checked').val();

                $('select[name="gold_type"]').val(mobileGoldType);
                $('select[name="price_range"]').val(mobilePriceRange);
                $('select[name="filter_item"]').val(mobileSort);
            }

            $('select[name="gold_type"], select[name="price_range"], select[name="filter_item"]').on('change', function () {
                syncDesktopToMobile();
                applyFilters();
            });

            $('select[name="gold_type_mobile"], select[name="price_range_mobile"]').on('change', function () {
                syncMobileToDesktop();
                applyFilters();
            });

            $('input[name="sort_mobile"]').on('change', function () {
                syncMobileToDesktop();
                applyFilters();
            });
        }

        function initGoldTypeFilter() {
            $.ajax({
                url: 'http://localhost:8080/api/v1/product/gold-type',
                method: 'GET',
                success: function (res) {
                    if (res.data && res.data.length > 0) {
                        const pcSelect = $('select[name="gold_type"]');
                        const mobileSelect = $('select[name="gold_type_mobile"]');

                        pcSelect.empty().append('<option value="">Tuổi vàng</option>');
                        mobileSelect.empty().append('<option value="">Chọn tuổi vàng</option>');

                        res.data.forEach(type => {
                            const text = 'Vàng ' + type.replace('GOLD_', '');
                            const option = `<option value="${type}">${text}</option>`;
                            pcSelect.append(option);
                            mobileSelect.append(option);
                        });

                        syncFilters();
                    }
                },
                error: function () {
                    alert('Không thể tải danh sách tuổi vàng.');
                }
            });
        }

        function handleMobileFilterApply() {
            $('.btn-apply').on('click', function () {
                syncMobileToDesktop();
                applyFilters();
                $('#filterPanel').removeClass('active');
            });
        }

        function handleFilterReset() {
            $('.btn-reset').on('click', function () {
                $('select[name="gold_type"]').val('');
                $('select[name="gold_type_mobile"]').val('');
                $('select[name="price_range"]').val('');
                $('select[name="price_range_mobile"]').val('');
                $('select[name="filter_item"]').val('');

                $('.outline-none').val('');

                const urlParams = new URLSearchParams(window.location.search);
                urlParams.delete('search');
                const newUrl = `${window.location.pathname}${urlParams.toString() ? '?' + urlParams.toString() : ''}`;
                window.history.replaceState({}, '', newUrl);

                applyFilters();
                $('#filterPanel').removeClass('active');
            });
        }

        function displayProducts(products) {
            const container = $('#container__newitem');
            container.empty();

            if (!products || products.length === 0) {
                container.append(`
            <div class="no-products">
                <p>Không tìm thấy sản phẩm nào phù hợp với bộ lọc của bạn.</p>
            </div>
        `);
                return;
            }

            products.forEach(product => {
                const productHtml = createProductHtml(product);
                container.append(productHtml);
            });
        }

        function createProductHtml(product) {
            const formattedPrice = formatPrice(product.price);
            const primaryImage = product.primaryImageUrl || '';
            const hoverImage = getHoverImage(product.images) || primaryImage;
            const displayName = product.displayName || product.name;
            const soldQuantity = product.soldQuantity || 0;
            let soldHtml = "";

            if (soldQuantity > 0) {
                soldHtml = `<p>${soldQuantity} đã bán</p>`;
            }

            return `
                <a href="product-detailed.html?id=${product.id}" class="col l-2-9 m-3-9 c-5-9 container__block__new">
                    <div class="container__blocknew--item">
                        <div class="container__img">
                            <img src="${primaryImage}" 
                                class="container__imgnew--w" 
                                alt="${product.name}"
                                onerror="this.src='https://via.placeholder.com/300x300?text=No+Image'">
                            <img src="${hoverImage}" 
                                class="container__img--h" 
                                alt="${product.name}"
                                onerror="this.src='${primaryImage}'">
                            
                            ${product.status === 'NEW' ? `
                            <span class="container__rightnew">
                                <img src="https://cdn.pnj.io/images/image-update/tag-product/new-icon-3-w29.svg" alt="New">
                            </span>
                            ` : ''}
                            
                            <div class="container__leftnew">
                                <img src="https://cdn.pnj.io/images/image-update/2022/10/pnjfast/PNJfast-Giaotrong3h.svg" alt="Fast delivery">
                            </div>
                        </div>

                        <div class="container__namenew">
                            <p>${displayName}</p>
                        </div>
                        <div class="container__pricenew">
                            <p>${formattedPrice}</p>
                        </div>
                        <div class="container__sales">
                            ${soldHtml}
                        </div>
                    </div>
                </a>
            `;
        }

        function formatPrice(price) {
            if (!price) return '0đ';
            return new Intl.NumberFormat('vi-VN').format(price) + 'đ';
        }

        function getHoverImage(images) {
            if (!images || images.length <= 1) return null;
            const hoverImage = images.find(img => !img.isPrimary);
            return hoverImage ? hoverImage.imageUrl : null;
        }

        function updatePagination(pageData) {
            const paginationContainer = $('.pagination-wrapper .pagination-list');
            paginationContainer.empty();

            const currentPage = pageData.number;
            const totalPages = pageData.totalPages;

            if (totalPages <= 1) {
                paginationContainer.parent().hide();
                return;
            }

            paginationContainer.parent().show();

            const prevDisabled = currentPage === 0 ? 'disabled' : '';
            paginationContainer.append(`
                <li class="pagination-item ${prevDisabled}">
                    ${currentPage === 0 ? '<span>&laquo;</span>' : `<a href="#" data-page="${currentPage - 1}">&laquo;</a>`}
                </li>
            `);

            const pageNumbers = generatePageNumbers(currentPage, totalPages);
            pageNumbers.forEach(pageNum => {
                if (pageNum === '...') {
                    paginationContainer.append('<li class="pagination-item"><span>...</span></li>');
                } else if (pageNum === currentPage) {
                    paginationContainer.append(`<li class="pagination-item active"><span>${pageNum + 1}</span></li>`);
                } else {
                    paginationContainer.append(`<li class="pagination-item"><a href="#" data-page="${pageNum}">${pageNum + 1}</a></li>`);
                }
            });

            const nextDisabled = currentPage >= totalPages - 1 ? 'disabled' : '';
            paginationContainer.append(`
                <li class="pagination-item ${nextDisabled}">
                    ${currentPage >= totalPages - 1 ? '<span>&raquo;</span>' : `<a href="#" data-page="${currentPage + 1}">&raquo;</a>`}
                </li>
            `);

            attachPaginationEvents();
        }

        function generatePageNumbers(currentPage, totalPages) {
            const pages = [];
            const maxVisiblePages = 5;

            if (totalPages <= maxVisiblePages) {
                for (let i = 0; i < totalPages; i++) {
                    pages.push(i);
                }
            } else {
                if (currentPage <= 2) {
                    for (let i = 0; i < 3; i++) pages.push(i);
                    pages.push('...');
                    pages.push(totalPages - 1);
                } else if (currentPage >= totalPages - 3) {
                    pages.push(0);
                    pages.push('...');
                    for (let i = totalPages - 3; i < totalPages; i++) pages.push(i);
                } else {
                    pages.push(0);
                    pages.push('...');
                    for (let i = currentPage - 1; i <= currentPage + 1; i++) pages.push(i);
                    pages.push('...');
                    pages.push(totalPages - 1);
                }
            }

            return pages;
        }

        function attachPaginationEvents() {
            $('.pagination-item a[data-page]').off('click').on('click', function (e) {
                e.preventDefault();
                const pageNumber = parseInt($(this).data('page'));
                loadProductsWithCurrentFilters(pageNumber);
            });
        }

        function loadProductsWithCurrentFilters(pageNumber = 0, overrideCategoryId = null) {
            const urlParams = new URLSearchParams(window.location.search);
            const searchQuery = urlParams.get('search') || '';
            const goldType = $('select[name="gold_type"]').val();
            const priceRange = $('select[name="price_range"]').val();
            const sortBy = $('select[name="filter_item"]').val();

            let fromPrice = '';
            let toPrice = '';
            if (priceRange && priceRange.includes('-')) {
                const [from, to] = priceRange.split('-');
                fromPrice = from;
                toPrice = to === '999999999' ? '' : to;
            }

            const params = new URLSearchParams();
            if (searchQuery) params.append('name', searchQuery);
            if (goldType) params.append('goldType', goldType);
            if (fromPrice) params.append('fromPrice', fromPrice);
            if (toPrice) params.append('toPrice', toPrice);

            switch (sortBy) {
                case 'price_desc':
                    params.append('sortBy', 'price');
                    params.append('sortDirection', 'desc');
                    break;
                case 'price_asc':
                    params.append('sortBy', 'price');
                    params.append('sortDirection', 'asc');
                    break;
                default:
                    params.append('sortBy', 'dateOfEntry');
                    params.append('sortDirection', 'desc');
            }

            params.append('pageSize', '12');
            params.append('pageNumber', pageNumber);

            const categoryId = overrideCategoryId || getCurrentCategoryId();
            const url = `http://localhost:8080/api/v1/product/category/${categoryId}?${params.toString()}`;

            showLoading();

            $.ajax({
                url: url,
                method: 'GET',
                success: function (response) {
                    hideLoading();
                    if (response.data && response.data.content) {
                        displayProducts(response.data.content);
                        updatePagination(response.data);

                        $('html, body').animate({
                            scrollTop: $('.container__newitem').offset().top - 100
                        }, 500);
                    }
                },
                error: function (xhr, status, error) {
                    hideLoading();
                    console.error('Error loading products:', error);
                    alert('Không thể tải danh sách sản phẩm. Vui lòng thử lại sau.');
                }
            });
        }

        function showLoading() {
            $('#container__newitem').html(`
            <div class="loading-spinner" style="text-align: center; padding: 50px;">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p>Đang tải sản phẩm...</p>
            </div>
        `);
        }

        function hideLoading() {
            $('.loading-spinner').remove();
        }

        function getCurrentCategoryId() {
            const pathArray = window.location.pathname.split('/');
            const categoryIndex = pathArray.indexOf('category');

            if (categoryIndex !== -1 && categoryIndex + 1 < pathArray.length) {
                return pathArray[categoryIndex + 1];
            }

            return $('#categoryId').val() || $('[data-category-id]').data('category-id') || 1;
        }

        function applyFilters() {
            loadProductsWithCurrentFilters(0);
        }

        function refreshUserUI() {
            const user = JSON.parse(localStorage.getItem('userInfo'));
            UserSync.updateAccountInfo(user);
            UserSync.loadCategories();
            CartMiniUtils.refresh();
        }

        function initializePageComponents() {
            $(document).trigger('headerLoaded');
        }

        $(document).on('click', '.navbar__tablet--list .has-children > span', function (e) {
            e.preventDefault(); // chặn link nhảy
            const parentLi = $(this).parent();
            parentLi.toggleClass('open');
        });

        CartMiniUtils.onCartUpdated(function (cart, summary) {
            console.log('Cart đã được cập nhật:', summary);
        });

        $(() => {
            $('#popup-banner-placeholder').load('./assets/layout/Banner.html');
            $('#header').load('./assets/layout/HeaderPc.html', function () {
                refreshUserUI();
                initializePageComponents();
            });
            $('#header_tablet').load('./assets/layout/HeaderTabletAndMobile.html', refreshUserUI);
            $('#footer').load('./assets/layout/Footer.html');
            $('#chatbot-placeholder').load('./assets/layout/Chatbot.html');
        });
    </script>
</body>

</html>
