<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="shortcut icon" href="./assets/img/Icon.webp" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/grid.css">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/responsive.css">
    <link rel="stylesheet" href="./assets/css/my-home.css">
    <link rel="stylesheet" href="./assets/icon/fontawesome-free-6.6.0-web/css/all.min.css">
    <!-- google roboto font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/component/ResetBoostrap.css">
    <title>MyPNJ - Trang chủ</title>
</head>

<body>
    <div class="app">
        <div class="my-home">
            <div class="home-header-bg">
                <img src="https://cdn.pnj.io/images/customer/home/bg_common_for_all_users.jpg" alt="">
            </div>
            <div class="home-header-content">
                <div class="home-header-row">
                    <span class="home-title">My PNJ</span>
                    <a href="./index.html" class="home-buy-link">
                        <div class="home-buy-image">
                            <img src="https://cdn.pnj.io/images/customer/home/ic_ecommerce.svg" alt="">
                        </div>
                        <span>Mua hàng tại PNJ</span>
                    </a>
                </div>
                <div class="home-user-welcome">Xin chào !</div>
                <div id="home-user-name" class="home-user-name">TÔ VĂN ĐỨC</div>
                <div class="home-user-tags">
                    <span class="home-user-tag-rank">Hạng thẻ
                        <span class="home-user-tag">Kết nối</span>
                    </span>
                </div>
            </div>
            <div class="pd-12">
                <div class="home-card home-point-card shadow-lg">
                    <div class="home-point-row">
                        <div class="home-point-label">Điểm hạng thẻ</div>
                    </div>
                    <div class="home-point-row">
                        <div class="home-point-value">0 điểm</div>
                        <div class="home-point-max">99 điểm</div>
                    </div>
                    <div class="home-point-bar-bg">
                        <div class="home-point-bar" style="width:0%"></div>
                    </div>
                    <div class="home-point-desc">Bạn cần 100 điểm nữa để tăng hạng</div>
                </div>
                <div class="home-feature-list">
                    <div class="home-feature-row">
                        <a href="./orders.html" class="home-feature-item">
                            <div class="home-feature-name">
                                <span>Đơn hàng</span>
                                <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 5l7 7-7 7"></path>
                                </svg>
                            </div>
                            <div class="home-feature-border clip-bottom-0">
                                <div class="home-feature-icon">
                                    <img src="https://cdn.pnj.io/images/customer/home/shopping_bag.svg" alt="Đơn hàng"
                                        width="65" height="62" />
                                </div>
                            </div>
                        </a>
                        <a href="./benefits.html" class="home-feature-item">
                            <div class="home-feature-name">
                                <span>Quyền lợi của tôi</span>
                                <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 5l7 7-7 7"></path>
                                </svg>
                            </div>
                            <div class="home-feature-border clip-bottom-0">
                                <div class="home-feature-icon">
                                    <img src="https://cdn.pnj.io/images/customer/home/double_stars.svg" alt="Đơn hàng"
                                        width="62" height="65" />
                                </div>
                            </div>
                        </a>
                    </div>
                    <div class="home-feature-row">
                        <a href="./promotions.html" class="home-feature-item">
                            <div class="home-feature-name">
                                <span>Phiếu quà tặng</span>
                                <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 5l7 7-7 7"></path>
                                </svg>
                            </div>
                            <div class="home-feature-border clip-bottom-0">
                                <div class="home-feature-icon">
                                    <img src="https://cdn.pnj.io/images/customer/home/gift_box.svg" alt="Đơn hàng"
                                        width="60" height="60" />
                                </div>
                            </div>
                        </a>
                        <a href="./discount-code.html" class="home-feature-item">
                            <div class="home-feature-name">
                                <span>Mã giảm giá</span>
                                <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 5l7 7-7 7"></path>
                                </svg>
                            </div>
                            <div class="home-feature-border clip-bottom-0">
                                <div class="home-feature-icon">
                                    <img src="https://cdn.pnj.io/images/customer/home/percent.svg" alt="Đơn hàng"
                                        width="56" height="56" />
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
                <div class="home-banner">
                    <img src="https://cdn.pnj.io/images/customer/home/banner_home_page_20250619.jpeg"
                        alt="Banner PNJ" />
                </div>
                <div id="home-bottom-nav">

                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./assets/js/account-sync.js"></script>

    <script>
        $(document).ready(function () {
            $('#home-bottom-nav').load('./assets/layout/home-bottom-nav.html', function () {
                console.log('Home bottom navigation loaded successfully.');
            });

            const user = JSON.parse(localStorage.getItem('userInfo'));

            if (!user) {
                alert('Vui lòng đăng nhập');
                window.location.href = 'login.html';
                return;
            }

            const userName = document.querySelector('#home-user-name');

            const fullName = (user.firstName + ' ' + user.lastName).trim() || 'Khách hàng';

            userName.textContent = fullName;
        });
    </script>
</body>


</html>
