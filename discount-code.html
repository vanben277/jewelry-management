<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="shortcut icon" href="./assets/img/Icon.webp" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/grid.css">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/responsive.css">
    <link rel="stylesheet" href="./assets/icon/fontawesome-free-6.6.0-web/css/all.min.css">
    <!-- google roboto font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/component/ResetBoostrap.css">
    <title>Mã giảm giá</title>
</head>

<body>
    <div class="app">
        <div class="order-modern">
            <div class="order-header">
                <a href="./my-home.html" class="order-left">
                    <div class="order-back"><i class="fa fa-angle-left"></i></div>
                    <span class="order-title">Mã giảm giá</span>
                </a>
                <a href="./my-home.html" class="order-right">
                    <div
                        class="w-6 h-6 bg-[rgba(145,158,171,0.08)] rounded-full overflow-hidden flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                            <path fill="#000"
                                d="M6 19h3v-5q0-.425.288-.712T10 13h4q.425 0 .713.288T15 14v5h3v-9l-6-4.5L6 10zm-2 0v-9q0-.475.213-.9t.587-.7l6-4.5q.525-.4 1.2-.4t1.2.4l6 4.5q.375.275.588.7T20 10v9q0 .825-.588 1.413T18 21h-4q-.425 0-.712-.288T13 20v-5h-2v5q0 .425-.288.713T10 21H6q-.825 0-1.412-.587T4 19m8-6.75">
                            </path>
                        </svg>
                    </div>
                </a>
            </div>
            <div class="order-list">
                <div class="order-no-card">
                    <p>Không có mã giảm giá nào</p>
                </div>
            </div>
        </div>
    </div>

    <style>
        body {
            background: #f8fafc;
        }

        .app {
            background: #f8fafc;
        }

        .order-modern {
            max-width: 480px;
            margin: 0px auto;
            background: #fff;
            padding: 24px 18px 12px 18px;
            min-height: 100vh;
        }

        .order-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            margin-bottom: 18px;
            justify-content: space-between;
        }

        .order-header a {
            text-decoration: none;
        }

        .order-right {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: #f6f7f8;
            width: 20px;
            height: 20px;
        }

        .order-left {
            display: flex;
            align-items: center;
        }

        .order-back {
            color: #212121;
            font-size: 1.4rem;
            text-decoration: none;
            margin-right: 6px;
        }

        .order-title {
            font-weight: 500;
            color: #212121;
        }


        .order-list {
            margin-top: 0;
        }


        .order-no-card {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            margin-top: 88px;
            font-size: 1.4rem;
            color: #637381;
            text-align: center;
        }

        @media(max-width: 739px) {
            .order-modern {
                max-width: 99vw;
                padding: 8px 2vw 8px 2vw;
                margin: unset;
                border-radius: unset;
            }

            .order-header {
                margin-bottom: unset;
                padding: 14px 0;
            }

            .order-right {
                width: 24px;
                height: 24px;
            }

            .order-right div svg {
                width: 1.4em;
                height: 1.4em;
            }
        }
    </style>

</body>


</html>
