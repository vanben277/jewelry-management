<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="shortcut icon" href="./assets/img/Icon.webp" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/grid.css">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/responsive.css">
    <link rel="stylesheet" href="./assets/css/orders.css">
    <link rel="stylesheet" href="./assets/icon/fontawesome-free-6.6.0-web/css/all.min.css">
    <!-- google roboto font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/component/ResetBoostrap.css">
    <title>MyPNJ - Đơn hàng</title>
</head>

<body>
    <div class="app">
        <div class="order-modern">
            <div class="order-header">
                <a href="./my-home.html" class="order-left">
                    <div class="order-back"><i class="fa fa-angle-left"></i></div>
                    <span class="order-title">Đơn hàng</span>
                </a>
                <a href="./my-home.html" class="order-right">
                    <div
                        class="w-6 h-6 bg-[rgba(145,158,171,0.08)] rounded-full overflow-hidden flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                            <path fill="#000"
                                d="M6 19h3v-5q0-.425.288-.712T10 13h4q.425 0 .713.288T15 14v5h3v-9l-6-4.5L6 10zm-2 0v-9q0-.475.213-.9t.587-.7l6-4.5q.525-.4 1.2-.4t1.2.4l6 4.5q.375.275.588.7T20 10v9q0 .825-.588 1.413T18 21h-4q-.425 0-.712-.288T13 20v-5h-2v5q0 .425-.288.713T10 21H6q-.825 0-1.412-.587T4 19m8-6.75">
                            </path>
                        </svg>
                    </div>
                </a>
            </div>
            <!-- ...existing code... -->
            <div class="order-filter">
                <button class="order-filter-btn active" data-status="all">Tất cả</button>
                <button class="order-filter-btn" data-status="pending">Chờ xác nhận</button>
                <button class="order-filter-btn" data-status="confirmed">Đã xác nhận</button>
                <button class="order-filter-btn" data-status="shipped">Đang giao</button>
                <button class="order-filter-btn" data-status="delivered">Hoàn tất</button>
                <button class="order-filter-btn" data-status="cancelled">Đã hủy</button>
            </div>
            <div class="order-list">
                <a href="./bill-order.html" class="order-link">
                    <div class="order-card" data-status="completed">
                        <div class="order-card-row order-card-top">
                            <div class="order-card-left">
                                <span class="order-card-date">22:37 21/04/2025</span>
                                <div class="order-card-sku">
                                    <span class="order-card-channel">Kênh Online</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="1.1em" height="1.1em"
                                        viewBox="0 0 48 48">
                                        <path fill="#919eab" stroke="#919eab" stroke-width="4"
                                            d="M24 33a9 9 0 1 0 0-18a9 9 0 0 0 0 18Z"></path>
                                    </svg>
                                    <span class="order-card-id">#1664017</span>
                                </div>
                            </div>
                            <span class="order-card-status pending">Chờ xác nhận</span>
                            <span class="order-card-status confirmed">Đã xác nhận</span>
                            <span class="order-card-status shipped">Đang giao</span>
                            <span class="order-card-status delivered">Hoàn tất</span>
                            <span class="order-card-status cancelled">Đã hủy</span>
                        </div>
                        <div class="order-card-row order-card-product">
                            <img src="https://cdn.pnj.io/images/thumbnails/300/300/detailed/214/sp-sd0000w000011-day-chuyen-bac-pnjsilver-1.png"
                                alt="Dây chuyền Bạc PNJSilver" class="order-card-img" />
                            <span class="order-card-name">1x Dây chuyền Bạc PNJSilver 0000W000011</span>
                        </div>
                        <div class="order-card-row order-card-total">
                            <span class="order-card-total-label">Tổng tiền:</span>
                            <span class="order-card-total-value">980.000đ</span>
                        </div>
                    </div>
                </a>
                <div class="order-no-card">
                    <p>Không có đơn hàng nào</p>
                </div>
            </div>
        </div>
    </div>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function () {
            const accountId = localStorage.getItem('userId');
            let currentStatus = "";

            function loadOrders(status) {
                currentStatus = status;
                let url = `http://localhost:8080/api/v1/order/me/${accountId}`;

                if (status && status !== "all") {
                    url += `?status=${status.toUpperCase()}`;
                }

                $.ajax({
                    url: url,
                    method: "GET",
                    headers: {
                        'Authorization': 'Basic ' + localStorage.getItem('auth'),
                        'Content-Type': 'application/json'
                    },
                    success: function (res) {
                        if (res.data.status) {
                            switch (res.data.status) {
                                case 'ACTIVE':
                                    break;
                                case 'BANNED':
                                    alert("Tài khoản đã bị cấm!");
                                    localStorage.removeItem('auth');
                                    localStorage.removeItem('userId');
                                    localStorage.removeItem('userInfo');
                                    window.location.href = 'exception.html?code=403'
                                    break;
                                case 'INACTIVE':
                                    alert("Tài khoản đã bị vô hiệu hóa!");
                                    localStorage.removeItem('auth');
                                    localStorage.removeItem('userId');
                                    localStorage.removeItem('userInfo');
                                    window.location.href = 'exception.html?code=403'
                                    break;
                                case 'PENDING':
                                    alert("Tài khoản đang chờ xác thực!");
                                    localStorage.removeItem('auth');
                                    localStorage.removeItem('userId');
                                    localStorage.removeItem('userInfo');
                                    window.location.href = 'exception.html?code=403'
                                    break;
                                default:
                                    alert("Lỗi không xác định");
                                    window.location.href = 'exception.html?code=500'
                            }
                        }
                        renderOrders(res.data || []);
                    },
                    error: function (xhr) {
                        console.error(xhr.responseText);
                        $(".order-list").html(`<div class="order-no-card"><p>Không thể tải đơn hàng</p></div>`);
                    }
                });
            }

            const statusMapping = {
                'pending': 'Chờ xác nhận',
                'confirmed': 'Đã xác nhận',
                'shipped': 'Đang giao',
                'delivered': 'Hoàn tất',
                'cancelled': 'Đã hủy'
            };


            function renderOrders(orders) {
                const orderList = $(".order-list");
                orderList.empty();

                if (!orders || orders.length === 0) {
                    orderList.html(`<div class="order-no-card"><p>Không có đơn hàng nào</p></div>`);
                    return;
                }

                orders.forEach(order => {

                    const orderDate = new Date(order.createAt).toLocaleString('vi-VN', {
                        hour: '2-digit',
                        minute: '2-digit',
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric'
                    });

                    const orderCard = `
                        <a href="./bill-order.html?id=${order.id}" class="order-link">
                            <div class="order-card" data-status="${order.status.toLowerCase()}">
                                <div class="order-card-row order-card-top">
                                    <div class="order-card-left">
                                        <span class="order-card-date">${orderDate}</span>
                                        <div class="order-card-sku">
                                            <span class="order-card-channel">${order.channel || "Kênh Online"}</span>
                                            <svg xmlns="http://www.w3.org/2000/svg" width="1.1em" height="1.1em"
                                                viewBox="0 0 48 48">
                                                <path fill="#919eab" stroke="#919eab" stroke-width="4"
                                                    d="M24 33a9 9 0 1 0 0-18a9 9 0 0 0 0 18Z"></path>
                                            </svg>
                                            <span class="order-card-id">#${order.id}</span>
                                        </div>
                                    </div>
                                    <span class="order-card-status ${order.status.toLowerCase()}"> ${statusMapping[order.status.toLowerCase()] || order.status}</span>
                                </div>
                                <div class="order-card-row order-card-product">
                                    <img src="${order.items[0]?.image}" alt="${order.items[0]?.productName}" class="order-card-img" />
                                    <span class="order-card-name">${order.items[0].quantity}x ${order.items[0].productName}</span>
                                </div>
                                <div class="order-card-row order-card-total">
                                    <span class="order-card-total-label">Tổng tiền:</span>
                                    <span class="order-card-total-value">${order.totalPrice.toLocaleString('vi-VN')}đ</span>
                                </div>
                            </div>
                        </a>
                    `;
                    orderList.append(orderCard);
                });
            }

            $(".order-filter-btn").on("click", function () {
                $(".order-filter-btn").removeClass("active");
                $(this).addClass("active");

                const status = $(this).data("status");
                loadOrders(status);
            });

            loadOrders("all");
        });
    </script>
</body>


</html>
