  <!--   Core JS Files   -->
  <script src="../assets/js/core/popper.min.js"></script>
  <script src="../assets/js/core/bootstrap.min.js"></script>
  <script src="../assets/js/plugins/smooth-scrollbar.min.js"></script>
  <script src="../assets/js/plugins/chartjs.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="./assets/js/sidenav.js"></script>

  <script>
    var win = navigator.platform.indexOf('Win') > -1;
    if (win && document.querySelector('#sidenav-scrollbar')) {
      var options = {
        damping: '0.5'
      }
      Scrollbar.init(document.querySelector('#sidenav-scrollbar'), options);
    }

    async function loadMonthlyRevenue() {
      try {
        const auth = localStorage.getItem("auth");
        if (!auth) {
          alert("Bạn chưa đăng nhập!");
          return;
        }

        const response = await fetch("http://localhost:8080/api/v1/order/monthly-revenue", {
          method: "GET",
          headers: { 'Authorization': 'Basic ' + auth }
        });

        const result = await response.json();

        if (!response.ok) {
          switch (result.errorCode) {
            case "400022":
              alert("Tài khoản đã bị vô hiệu hóa. Vui lòng liên hệ quản trị viên!");
              break;
            case "400023":
              alert("Tài khoản đã bị khóa. Vui lòng liên hệ quản trị viên!");
              break;
            case "400024":
              alert("Tài khoản chưa được xác thực. Vui lòng kiểm tra email!");
              break;
            default:
              alert(result.errorMessage || "Đã xảy ra lỗi không xác định!");
          }
          return;
        }

        document.getElementById("moneyMonthly").innerText = result.data.totalMoneyMonthly.toLocaleString() + " VND";
        document.getElementById("orderMonthly").innerText = result.data.totalOrderMonthly;
        document.getElementById("productMonthly").innerText = result.data.totalProductMonthly;
        document.getElementById("productInventory").innerText = result.data.totalInventory;

      } catch (err) {
        console.error("Lỗi khi load monthly revenue:", err);
        alert("Không thể kết nối tới server!");
      }
    }

    loadMonthlyRevenue();

    const revenueData = {
      labels: [],
      datasets: [{
        label: 'Doanh thu (triệu VND)',
        data: [],
        backgroundColor: [
          'rgba(45, 206, 137, 0.8)',
          'rgba(94, 114, 228, 0.8)',
          'rgba(255, 159, 64, 0.8)',
          'rgba(255, 99, 132, 0.8)',
          'rgba(153, 102, 255, 0.8)',
          'rgba(255, 205, 86, 0.8)',
          'rgba(75, 192, 192, 0.8)',
          'rgba(255, 159, 64, 0.8)',
          'rgba(199, 199, 199, 0.8)',
          'rgba(83, 102, 255, 0.8)',
          'rgba(255, 99, 132, 0.8)',
          'rgba(45, 206, 137, 0.8)'
        ],
        borderColor: [
          'rgba(45, 206, 137, 1)',
          'rgba(94, 114, 228, 1)',
          'rgba(255, 159, 64, 1)',
          'rgba(255, 99, 132, 1)',
          'rgba(153, 102, 255, 1)',
          'rgba(255, 205, 86, 1)',
          'rgba(75, 192, 192, 1)',
          'rgba(255, 159, 64, 1)',
          'rgba(199, 199, 199, 1)',
          'rgba(83, 102, 255, 1)',
          'rgba(255, 99, 132, 1)',
          'rgba(45, 206, 137, 1)'
        ],
        borderWidth: 2,
        borderRadius: 8,
        borderSkipped: false,
      }]
    };

    // Config chart
    const config = {
      type: 'bar',
      data: revenueData,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(0, 0, 0, 0.8)',
            titleColor: 'white',
            bodyColor: 'white',
            cornerRadius: 8,
            displayColors: false,
            callbacks: {
              label: function (context) {
                return 'Doanh thu: ' + context.parsed.y.toLocaleString('vi-VN') + ' triệu VND';
              }
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: {
              color: 'rgba(0, 0, 0, 0.1)',
              drawBorder: false
            },
            ticks: {
              color: '#8392ab',
              font: { size: 11 },
              callback: function (value) {
                return value + 'M';
              }
            }
          },
          x: {
            grid: { display: false, drawBorder: false },
            ticks: { color: '#8392ab', font: { size: 11 } }
          }
        },
        interaction: { intersect: false, mode: 'index' }
      }
    };

    let revenueChart;

    // Hàm cập nhật chart từ API
    function updateRevenueChart(apiData) {
      if (!revenueChart) return;

      revenueChart.data.labels = apiData.map(item => item.month);
      revenueChart.data.datasets[0].data = apiData.map(item => item.revenue);

      // Tính tổng
      const totalRevenue = apiData.reduce((sum, item) => sum + (item.revenue || 0), 0);
      document.getElementById('total-revenue').textContent =
        totalRevenue.toFixed(1) + 'M VND';

      // Tính trung bình
      const avgRevenue = totalRevenue / (apiData.length || 1);
      document.getElementById('avg-revenue').textContent =
        Math.round(avgRevenue) + 'M VND';

      revenueChart.update();
    }

    // Hàm gọi API
    async function fetchRevenueData(year) {
      try {
        const auth = localStorage.getItem('auth');
        if (!auth) {
          console.warn('Bạn không có quyền truy cập');
          return;
        }

        const url = `http://localhost:8080/api/v1/order/monthly?year=${year}&millions=true`;
        const res = await fetch(url, {
          method: 'GET',
          headers: { 'Authorization': 'Basic ' + auth }
        });

        const json = await res.json();
        if (!res.ok) {
          console.error('API lỗi:', json);
          alert(json.errorMessage || json.message || 'Lỗi khi lấy dữ liệu');
          return;
        }

        updateRevenueChart(json.data);
      } catch (err) {
        console.error('Lỗi fetchRevenueData', err);
      }
    }

    // Khi load trang -> khởi tạo chart + gọi API
    window.addEventListener('load', () => {
      const ctx = document.getElementById('chart-bars');
      if (ctx) {
        revenueChart = new Chart(ctx, config);

        const currentYear = new Date().getFullYear();
        document.getElementById('yearSelect').value = currentYear;
        document.getElementById('year-span').textContent = currentYear;

        fetchRevenueData(currentYear);
      }

      // Lắng nghe sự kiện đổi năm
      document.getElementById('yearSelect').addEventListener('change', (e) => {
        const year = e.target.value;
        document.getElementById('year-span').textContent = year;
        fetchRevenueData(year);
      });
    });

  </script>
