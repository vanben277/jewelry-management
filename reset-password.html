<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="shortcut icon" href="./assets/img/Icon.webp" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <!-- google roboto font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <title>Đặt lại mật khẩu</title>
</head>

<body>
    <div class="app">
        <div class="form">
            <div class="form__user">
                <div class="logo">
                    <a href="./index.html"><img src="https://www.pnj.com.vn/my_profile_asset/logo.svg"
                            alt="PNJ Logo"></a>
                </div>
                <form class="form__block" method="POST" action="#" onsubmit="return validateForm()"
                    id="resetPasswordForm">
                    <div class="mb-3">
                        <label for="otpInput" class="form-label">Mã OTP</label>
                        <input type="text" class="form-control" name="otp" id="otpInput" maxlength="6"
                            placeholder="Nhập mã OTP 6 số">
                        <div id="otpError" class="error-message">Vui lòng nhập mã OTP gồm 6 số!</div>
                        <div class="form-text">Nhập mã OTP được gửi qua email của bạn</div>
                    </div>

                    <div class="mb-3">
                        <label for="newPasswordInput" class="form-label">Mật khẩu mới</label>
                        <div class="password-input-container">
                            <input type="password" class="form-control" name="newPassword" id="newPasswordInput"
                                placeholder="Nhập mật khẩu mới">
                            <button type="button" class="password-toggle"
                                onclick="togglePassword('newPasswordInput', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div id="newPasswordError" class="error-message">Mật khẩu không hợp lệ!</div>
                        <div class="form-text">Mật khẩu phải có 8-16 ký tự, chứa ít nhất: 1 chữ thường, 1 chữ hoa, 1 số,
                            1 ký tự đặc biệt (@$!%*?&)</div>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPasswordInput" class="form-label">Xác nhận mật khẩu mới</label>
                        <div class="password-input-container">
                            <input type="password" class="form-control" name="confirmPassword" id="confirmPasswordInput"
                                placeholder="Nhập lại mật khẩu mới">
                            <button type="button" class="password-toggle"
                                onclick="togglePassword('confirmPasswordInput', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div id="confirmPasswordError" class="error-message">Mật khẩu xác nhận không khớp!</div>
                        <div class="form-text">Nhập lại mật khẩu để xác nhận</div>
                    </div>

                    <div class="form__align">
                        <button type="submit" class="btn btn-primary" name="btnResetPassword">Đặt lại mật khẩu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <style>
        .form {
            width: 100%;
            display: flex;
            justify-content: center;
            background-color: #f8fafc;
            min-height: 100vh;
        }

        .form__user {
            border-radius: 5px;
            background-color: #ffffff;
            position: relative;
            width: 60%;
            max-width: 420px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .logo {
            display: flex;
            width: 100%;
            justify-content: center;
            margin: 20px 0;
        }

        .logo img {
            width: 92px;
            height: 48px;
        }

        .form__block {
            width: auto;
            margin-top: 8px;
            border-radius: 3px;
            font-size: 1.5rem;
            color: var(--text-color);
        }

        .form__align {
            margin: 0 19px 20px 19px;
        }

        .password-input-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            padding: 0;
            font-size: 14px;
        }

        .password-toggle:hover {
            color: var(--text-color);
        }

        .form-control {
            padding: 8px 40px 8px 12px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid #ddd;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
            outline: 0;
        }

        .form-control[readonly] {
            background-color: #f8f9fa;
            opacity: 1;
        }

        .form-label {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .btn {
            font-size: 1.5rem;
            color: white;
            background-color: var(--text-blue);
            border: none;
            width: 100%;
            min-height: 40px;
            border-radius: 5px;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }

        .mb-3 {
            margin: 18px 19px 0 19px;
        }

        .error-message {
            color: #dc3545;
            font-size: 1.2rem;
            margin-top: 0.25rem;
            display: none;
        }

        .form-text {
            font-size: 1.2rem;
            color: #6c757d;
            margin-top: 5px;
            line-height: 1.4;
        }

        /* OTP Input specific styling */
        #otpInput {
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 3px;
        }

        .password-strength {
            margin-top: 5px;
            font-size: 1.1rem;
        }

        .strength-weak {
            color: #dc3545;
        }

        .strength-medium {
            color: #ffc107;
        }

        .strength-strong {
            color: #28a745;
        }

        @media(max-width: 739px) {
            .form__user {
                min-width: 95vw;
                margin: 10px;
            }

            .btn {
                font-size: 1.5rem;
                color: white;
            }

            .mb-3 {
                margin: 15px 15px 0 15px;
            }

            .form__align {
                margin: 0 15px 20px 15px;
            }
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        // Get email from URL parameters if available
        document.addEventListener('DOMContentLoaded', function () {
            // Any initialization code can go here if needed
        });

        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function validateForm() {
            let isValid = true;

            // Validate OTP
            const otp = document.getElementById('otpInput').value;
            if (otp.trim() === '') {
                showError('otpError', 'Vui lòng nhập mã OTP!');
                isValid = false;
            } else if (!/^\d{6}$/.test(otp)) {
                showError('otpError', 'Mã OTP phải gồm 6 số!');
                isValid = false;
            } else {
                hideError('otpError');
            }

            // Validate new password
            const newPassword = document.getElementById('newPasswordInput').value;
            if (newPassword.trim() === '') {
                showError('newPasswordError', 'Vui lòng nhập mật khẩu mới!');
                isValid = false;
            } else if (!isValidPassword(newPassword)) {
                showError('newPasswordError', 'Mật khẩu phải có 8-16 ký tự, chứa ít nhất: 1 chữ thường, 1 chữ hoa, 1 số, 1 ký tự đặc biệt (@$!%*?&)');
                isValid = false;
            } else {
                hideError('newPasswordError');
            }

            // Validate confirm password
            const confirmPassword = document.getElementById('confirmPasswordInput').value;
            if (confirmPassword.trim() === '') {
                showError('confirmPasswordError', 'Vui lòng xác nhận mật khẩu!');
                isValid = false;
            } else if (newPassword !== confirmPassword) {
                showError('confirmPasswordError', 'Mật khẩu xác nhận không khớp!');
                isValid = false;
            } else {
                hideError('confirmPasswordError');
            }

            return isValid;
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function isValidPassword(password) {
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,16}$/;
            return passwordRegex.test(password);
        }

        function showError(errorId, message) {
            const errorElement = document.getElementById(errorId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        function hideError(errorId) {
            document.getElementById(errorId).style.display = 'none';
        }

        // Real-time validation
        document.getElementById('otpInput').addEventListener('input', function () {
            // Only allow numbers
            this.value = this.value.replace(/[^0-9]/g, '');
            hideError('otpError');
        });

        document.getElementById('newPasswordInput').addEventListener('input', function () {
            hideError('newPasswordError');
            // Check if confirm password matches when user types new password
            const confirmPassword = document.getElementById('confirmPasswordInput').value;
            if (confirmPassword && this.value !== confirmPassword) {
                showError('confirmPasswordError', 'Mật khẩu xác nhận không khớp!');
            } else if (confirmPassword && this.value === confirmPassword) {
                hideError('confirmPasswordError');
            }
        });

        document.getElementById('confirmPasswordInput').addEventListener('input', function () {
            hideError('confirmPasswordError');
            const newPassword = document.getElementById('newPasswordInput').value;
            if (newPassword && this.value !== newPassword) {
                showError('confirmPasswordError', 'Mật khẩu xác nhận không khớp!');
            } else if (newPassword && this.value === newPassword) {
                hideError('confirmPasswordError');
            }
        });

        $('#resetPasswordForm').on('submit', function (e) {
            e.preventDefault();

            if (!validateForm()) {
                return;
            }

            var formData = {
                otpSku: $('#otpInput').val(),
                newPassword: $('#newPasswordInput').val()
            }

            // Disable submit button to prevent double submission
            const submitBtn = $('button[name="btnResetPassword"]');
            submitBtn.prop('disabled', true).text('Đang xử lý...');

            $.ajax({
                type: 'PUT',
                url: 'http://localhost:8080/api/v1/reset-password',
                data: JSON.stringify(formData),
                contentType: 'application/json',
                success: function (response) {
                    alert('Đặt lại mật khẩu thành công! Bạn có thể đăng nhập bằng mật khẩu mới.');
                    window.location.href = 'login.html';
                },
                error: function (xhr, status, error) {
                    var errorMessage = '';

                    try {
                        var response = JSON.parse(xhr.responseText);
                        var errorCode = response.errorCode;

                        switch (errorCode) {
                            case 400026:
                                errorMessage = 'Mã OTP không hợp lệ. Vui lòng kiểm tra lại mã OTP.';
                                break;
                            case 400027:
                                errorMessage = 'Mã OTP đã hết hạn. Vui lòng yêu cầu gửi lại OTP mới.';
                                break;
                            case 400022:
                                errorMessage = 'Tài khoản đã bị vô hiệu hóa. Vui lòng liên hệ quản trị viên!';
                                break;
                            case 400023:
                                errorMessage = 'Tài khoản đã bị khóa. Vui lòng liên hệ quản trị viên!';
                                break;
                            case 4000024:
                                errorMessage = 'Tài khoản chưa được xác thực. Vui lòng kiểm tra email!';
                                break;
                            default:
                                if (xhr.status === 500) {
                                    errorMessage = 'Đã xảy ra lỗi máy chủ. Vui lòng thử lại sau.';
                                } else {
                                    errorMessage = 'Đã xảy ra lỗi. Vui lòng thử lại sau.';
                                }
                        }
                    } catch (e) {
                        // Fallback nếu response không phải JSON
                        if (xhr.status === 500) {
                            errorMessage = 'Đã xảy ra lỗi máy chủ. Vui lòng thử lại sau.';
                        } else {
                            errorMessage = 'Đã xảy ra lỗi. Vui lòng thử lại sau.';
                        }
                    }

                    alert(errorMessage);
                },
                complete: function () {
                    // Re-enable submit button
                    submitBtn.prop('disabled', false).text('Đặt lại mật khẩu');
                }
            });
        });
    </script>
</body>

</html>
