<!-- banner.html -->
<div id="banner-overlay"></div>
<div id="banner">
    <span class="close">×</span>
    <br>
    <a href="../../containers.html">
        <img src="https://a.omappapi.com/users/c6e493b4ae43/images/d49a83ce4ad91756107252-popup.png?width=747"
            alt="Banner Image" style="max-width: 100%; margin-top: 10px; border-radius: 3px;">
    </a>
</div>

<style>
    #banner-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 26, 65, 0.5);
        z-index: 9998;
    }

    #banner {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #222;
        padding: 20px;
        border-radius: 5px;
        z-index: 9999;
        max-width: 465px;
    }

    #banner .close {
        position: absolute;
        top: 12px;
        right: 15px;
        cursor: pointer;
        font-weight: bold;
        font-size: 26px;
        color: #fff;
        width: 30px;
        height: 30px;
        text-align: center;
        border-radius: 50%;
        background: #dddddd;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #banner .close:hover {
        color: #ddd;
        background: #fff;
    }
</style>

<script>
    $(document).ready(function () {
        let bannerClosed = sessionStorage.getItem('bannerClosed');

        if (!bannerClosed) {
            setTimeout(function () {
                $('#banner-overlay').fadeIn();
                $('#banner').fadeIn();
            }, 500);
        }

        $('#banner .close').click(function () {
            $('#banner').fadeOut();
            $('#banner-overlay').fadeOut();
            sessionStorage.setItem('bannerClosed', 'true');
        });

    });

          setTimeout(function () {
              $('#banner-overlay').fadeIn();
              $('#banner').fadeIn();

          $('#banner .close').click(function () {
              $('#banner').fadeOut();
              $('#banner-overlay').fadeOut();
          });
      });  */
</script>
