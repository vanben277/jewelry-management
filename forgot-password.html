<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="shortcut icon" href="./assets/img/Icon.webp" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <!-- google roboto font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <title>Quên mật khẩu</title>
</head>

<body>
    <div class="app">
        <div class="form">
            <div class="form__user">
                <div class="logo">
                    <a href="./index.html"><img src="https://www.pnj.com.vn/my_profile_asset/logo.svg"
                            alt="PNJ Logo"></a>
                </div>
                <form id="forgotPasswordForm" class="form__block" method="POST" action="#"
                    onsubmit="return validateForm()">
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Nhập email của bạn</label>
                        <input type="email" class="form-control" name="email" id="exampleInputEmail1"
                            aria-describedby="emailHelp">
                        <div id="accountError" class="error-message">Trường này không được bỏ trống!</div>
                        <div id="emailHelp" class="form-text">Vui lòng nhập email mà bạn đã đăng ký với chúng tôi</div>
                    </div>
                    <div class="form__align">
                        <button type="submit" class="btn btn-primary" name="btnRestPaword">Gửi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <style>
        .form {
            width: 100%;
            display: flex;
            margin: 0 auto;
            justify-content: center;
            background-color: #f8fafc;
            min-height: 100vh;
        }

        .form__user {
            border-radius: 5px;
            background-color: #ffffff;
            position: relative;
            width: 60%;
            max-width: 420px;
        }

        .logo {
            display: flex;
            width: 100%;
            justify-content: center;
            margin: 20px 0;
        }

        .logo img {
            width: 92px;
            height: 48px;
        }

        .form__block {
            width: auto;
            margin-top: 8px;
            border-radius: 3px;
            font-size: 1.5rem;
            color: var(--text-color);
        }

        .form__align {
            margin: 0 19px;
        }

        .form-control {
            padding: 4px 8px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }

        .form-label {
            font-size: 1.4rem;
            font-weight: 400;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .btn {
            font-size: 1.5rem;
            color: white;
            background-color: var(--text-blue);
            border: none;
            width: 100%;
            min-height: 32px;
            border-radius: 5px;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .mb-3 {
            margin: 18px 19px 0 19px;
        }

        .error-message {
            color: red;
            font-size: 1.2rem;
            margin-top: 0.25rem;
            display: none;
        }

        .form-text {
            font-size: 1.2rem;
            color: #6c757d;
            margin-top: 5px;
        }

        @media(max-width: 739px) {
            .form__user {
                min-width: 99vw;
            }

            .btn {
                font-size: 1.5rem;
                color: white;
            }

            .mb-3 {
                margin: 15px 15px 0 15px;
            }
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        function validateForm() {
            let isValid = true;
            const account = document.getElementById('exampleInputEmail1').value;

            // Kiểm tra email
            if (account.trim() === '') {
                document.getElementById('accountError').style.display = 'block';
                document.getElementById('accountError').textContent = 'Vui lòng nhập email của bạn!';
                isValid = false;
            } else if (!isValidEmail(account)) {
                document.getElementById('accountError').style.display = 'block';
                document.getElementById('accountError').textContent = 'Vui lòng nhập địa chỉ email hợp lệ!';
                isValid = false;
            } else {
                document.getElementById('accountError').style.display = 'none';
            }

            return isValid;
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        document.getElementById('exampleInputEmail1').addEventListener('input', function () {
            document.getElementById('accountError').style.display = 'none';
        });

        $('#forgotPasswordForm').on('submit', function (e) {
            e.preventDefault();

            if (!validateForm()) {
                alert('Vui lòng điền đầy đủ thông tin!');
                return;
            }

            var formData = {
                email: $('#exampleInputEmail1').val()
            }

            $.ajax({
                type: 'POST',
                url: 'http://localhost:8080/api/v1/forgot-password',
                data: JSON.stringify(formData),
                contentType: 'application/json',
                success: function (response) {
                    alert('Đã gửi email khôi phục mật khẩu. Vui lòng kiểm tra hộp thư của bạn.');
                    window.location.href = 'login.html';
                },

                error: function (xhr) {
                    let errorMessage = "Khôi phục thất bại: Vui lòng thử lại sau.";
                    let errorCode = xhr.status || 500;

                    try {
                        const response = JSON.parse(xhr.responseText || '{}');

                        const errorMessages = {
                            '400022': 'Tài khoản đã bị vô hiệu hóa. Vui lòng liên hệ quản trị viên!',
                            '400023': 'Tài khoản đã bị khóa. Vui lòng liên hệ quản trị viên!',
                            '400024': 'Tài khoản chưa được xác thực. Vui lòng kiểm tra email!',
                            '404005': 'Email không tồn tại trong hệ thống. Vui lòng kiểm tra lại!'
                        };

                        switch (xhr.status) {
                            case 400:
                                errorMessage = errorMessages[response.errorMessage] ||
                                    ("Khôi phục thất bại: " + (response.message || 'Email chưa đăng ký trong hệ thống!'));
                                console.log("Lỗi 400:", response.message);
                                break;

                            case 404:
                                errorMessage = errorMessages[response.errorMessage] ||
                                    response.message ||
                                    "Tài nguyên không tồn tại.";
                                console.log("Lỗi 404:", response.message);
                                break;

                            case 500:
                                errorMessage = "Khôi phục thất bại: Lỗi máy chủ. Vui lòng thử lại sau.";
                                console.error("Lỗi máy chủ:", xhr.responseText);
                                break;

                            case 0:
                                errorMessage = "Khôi phục thất bại: Không thể kết nối đến máy chủ.";
                                errorCode = 503;
                                console.error('Không thể kết nối server');
                                break;

                            default:
                                errorMessage = response.message || "Hệ thống đang bảo trì. Vui lòng thử lại sau!";
                                console.error('Lỗi không xác định:', xhr.status, xhr.responseText);
                        }

                    } catch (e) {
                        console.error("Lỗi khi parse response:", e);

                        const fallbackMessages = {
                            400: "Khôi phục thất bại: Yêu cầu không hợp lệ.",
                            404: "Khôi phục thất bại: Không thể xác định lỗi từ máy chủ.",
                            500: "Khôi phục thất bại: Lỗi máy chủ.",
                            0: "Khôi phục thất bại: Không thể kết nối đến máy chủ."
                        };

                        errorMessage = fallbackMessages[xhr.status] || "Khôi phục thất bại: Lỗi không xác định.";

                        if (xhr.status === 0) {
                            errorCode = 503;
                        }
                    }

                    alert(errorMessage);

                    const params = new URLSearchParams();
                    params.append('code', errorCode);
                    params.append('message', encodeURIComponent(errorMessage));

                    setTimeout(() => {
                        window.location.href = `exception.html?${params.toString()}`;
                    }, 100);
                }
            })
        })



    </script>
</body>

</html>
