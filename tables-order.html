  <script>
    var win = navigator.platform.indexOf('Win') > -1;
    if (win && document.querySelector('#sidenav-scrollbar')) {
      var options = {
        damping: '0.5'
      }
      Scrollbar.init(document.querySelector('#sidenav-scrollbar'), options);
    }

    // API Configuration
    const API_BASE_URL = 'http://localhost:8080/api/v1';

    // Utility functions for localStorage and auth
    function getAuthHeader() {
      const auth = localStorage.getItem('auth');
      if (!auth) {
        throw new Error('Không tìm thấy thông tin xác thực. Vui lòng đăng nhập lại.');
      }
      return {
        'Authorization': `Basic ${auth}`,
        'Content-Type': 'application/json'
      };
    }

    function checkAdminPermission() {
      const userInfo = localStorage.getItem('userInfo');
      if (!userInfo) {
        throw new Error('Không tìm thấy thông tin người dùng.');
      }

      const user = JSON.parse(userInfo);
      if (user.role !== 'ADMIN') {
        throw new Error('Bạn không có quyền truy cập chức năng này.');
      }
      return true;
    }

    // API Functions
    async function fetchOrderStatuses() {
      try {
        checkAdminPermission();
        const response = await fetch(`${API_BASE_URL}/order/status`, {
          method: 'GET',
          headers: getAuthHeader()
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const result = await response.json();
        // Return the data part since response has { message, data, errorMessage } structure
        return result.data || result;
      } catch (error) {
        console.error('Error fetching order statuses:', error);
        throw error;
      }
    }

    async function fetchOrders(filters = {}, pagination = {}) {
      try {
        checkAdminPermission();

        // Build query parameters
        const params = new URLSearchParams();

        if (filters.customerName) params.append('customerName', filters.customerName);
        if (filters.customerPhone) params.append('customerPhone', filters.customerPhone);
        if (filters.customerAddress) params.append('customerAddress', filters.customerAddress);
        if (filters.status) params.append('status', filters.status);

        params.append('pageSize', pagination.pageSize || 10);
        params.append('pageNumber', pagination.pageNumber || 0);

        const response = await fetch(`${API_BASE_URL}/order/filter?${params}`, {
          method: 'GET',
          headers: getAuthHeader()
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const result = await response.json();
        // Return the data part since response has { message, data, errorMessage } structure
        return result.data || result;
      } catch (error) {
        console.error('Error fetching orders:', error);
        throw error;
      }
    }

    async function fetchOrderDetail(orderId) {
      try {
        checkAdminPermission();

        const response = await fetch(`${API_BASE_URL}/order/${orderId}`, {
          method: 'GET',
          headers: getAuthHeader()
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const result = await response.json();
        // Return the data part since response has { message, data, errorMessage } structure
        return result.data || result;
      } catch (error) {
        console.error('Error fetching order detail:', error);
        throw error;
      }
    }

    async function updateOrderStatus(orderId, newStatus) {
      try {
        checkAdminPermission();

        const response = await fetch(`${API_BASE_URL}/order/status/${orderId}`, {
          method: 'PUT',
          headers: getAuthHeader(),
          body: JSON.stringify({ status: newStatus })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.errorMessage || errorData.message || `HTTP error! status: ${response.status}`);
        }

        const result = await response.json();
        return result.data || result;
      } catch (error) {
        console.error('Error updating order status:', error);
        throw error;
      }
    }

    // UI Helper Functions
    function formatPrice(price) {
      return new Intl.NumberFormat('vi-VN', {
        style: 'currency',
        currency: 'VND'
      }).format(price);
    }

    function formatDate(dateString) {
      if (!dateString) return 'N/A';
      return new Date(dateString).toLocaleDateString('vi-VN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getStatusInVietnamese(status) {
      const statusMap = {
        PENDING: 'Chờ xác nhận',
        CONFIRMED: 'Đã xác nhận',
        SHIPPED: 'Đã gửi hàng',
        DELIVERED: 'Đã giao hàng',
        CANCELLED: 'Đã hủy'
      };
      return statusMap[status] || status;
    }

    // Get valid status options based on current status (for status transition logic)
    function getValidStatusOptions(currentStatus) {
      switch (currentStatus) {
        case 'PENDING':
          return ['PENDING', 'CONFIRMED', 'CANCELLED'];
        case 'CONFIRMED':
          return ['CONFIRMED', 'SHIPPED', 'CANCELLED'];
        case 'SHIPPED':
          return ['SHIPPED', 'DELIVERED'];
        case 'DELIVERED':
        case 'CANCELLED':
          return [currentStatus]; // Cannot change from final states
        default:
          return [currentStatus];
      }
    }

    // Main Functions
    async function loadOrderStatuses() {
      try {
        const statuses = await fetchOrderStatuses();
        const selectElement = document.getElementById('selectStatusFilter');

        // Clear existing options except "Tất cả"
        selectElement.innerHTML = '<option value="">Tất cả</option>';

        statuses.forEach(status => {
          const option = document.createElement('option');
          option.value = status;
          option.textContent = status;
          selectElement.appendChild(option);
        });

      } catch (error) {
        console.error('Error loading order statuses:', error);
        alert('Không thể tải danh sách trạng thái: ' + error.message);
      }
    }

    let currentPage = 0;
    let currentPageSize = 10;
    let currentFilters = {};

    async function loadOrders() {
      try {
        // Get filter values
        const filters = {
          customerPhone: document.querySelector('input[placeholder="Nhập số điện thoại"]').value || '',
          customerName: document.querySelector('input[placeholder="Nhập tên khách hàng"]').value || '',
          customerAddress: document.querySelector('input[placeholder="Nhập địa chỉ"]').value || '',
          status: document.getElementById('selectStatusFilter').value || ''
        };

        // Remove empty filters
        currentFilters = Object.fromEntries(
          Object.entries(filters).filter(([key, value]) => value.trim() !== '')
        );

        const pagination = {
          pageNumber: currentPage,
          pageSize: currentPageSize
        };

        const response = await fetchOrders(currentFilters, pagination);
        console.log('API Response:', response); // Debug log

        // Handle Spring Boot Page response or direct array
        let ordersData;
        let paginationData = {};

        if (response.content && Array.isArray(response.content)) {
          // Spring Boot Page response
          ordersData = response.content;
          paginationData = {
            totalElements: response.totalElements,
            totalPages: response.totalPages,
            currentPage: response.number,
            size: response.size,
            first: response.first,
            last: response.last
          };
        } else if (Array.isArray(response)) {
          // Direct array response
          ordersData = response;
          paginationData = {
            totalElements: response.length,
            totalPages: 1,
            currentPage: 0,
            size: response.length,
            first: true,
            last: true
          };
        } else {
          // Fallback
          ordersData = [];
          paginationData = {
            totalElements: 0,
            totalPages: 0,
            currentPage: 0,
            size: 0,
            first: true,
            last: true
          };
        }

        displayOrders(ordersData);
        updatePaginationInfo(paginationData);
        generatePagination(paginationData);
      } catch (error) {
        console.error('Error loading orders:', error);
        alert('Không thể tải danh sách đơn hàng: ' + error.message);
      }
    }

    function displayOrders(orders) {
      const tbody = document.querySelector('tbody');
      tbody.innerHTML = '';

      console.log('Orders to display:', orders); // Debug log

      // Ensure orders is an array
      if (!Array.isArray(orders)) {
        console.error('Orders is not an array:', orders);
        tbody.innerHTML = `
            <tr>
                <td colspan="10" class="text-center py-4">
                    <i class="fas fa-exclamation-triangle me-2"></i>Dữ liệu không hợp lệ
                </td>
            </tr>
        `;
        return;
      }

      if (orders.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="10" class="text-center py-4">
                    <i class="fas fa-inbox me-2"></i>Không tìm thấy đơn hàng nào
                </td>
            </tr>

        return;

        const row = document.createElement('tr');

        // Get valid status options for this order
        const validStatuses = getValidStatusOptions(order.status);

        ).join('');

            </td>
            <td class="align-middle text-center">
                <select class="status-select active-status" onchange="handleStatusChange(${order.id}, this.value, '${order.status}')">
                    ${statusOptions}
                </select>
            </td>
            <td class="align-middle text-center">
                <span class="text-secondary text-xs font-weight-bold">${formatPrice(order.totalPrice || 0)}</span>
            </td>

    async function handleStatusChange(orderId, newStatus, currentStatus) {
      if (newStatus === currentStatus) {
        return; // No change
      }

      if (confirm(`Bạn có chắc chắn muốn chuyển trạng thái đơn hàng #${orderId} sang ${getStatusInVietnamese(newStatus)}?`)) {
        try {
          await updateOrderStatus(orderId, newStatus);
          alert('Cập nhật trạng thái thành công!');
          await loadOrders(); // Reload the orders list
        } catch (error) {
          alert('Lỗi khi cập nhật trạng thái: ' + error.message);
          // Revert the select back to original value
          const selectElement = event.target;
          selectElement.value = currentStatus;
        }
      } else {
        // Revert the select back to original value
        const selectElement = event.target;
        selectElement.value = currentStatus;
      }
    }

    function updatePaginationInfo(paginationData) {
      const paginationInfo = document.querySelector('.pagination-info');
      if (paginationInfo && paginationData.totalElements !== undefined) {
        const startItem = paginationData.currentPage * paginationData.size + 1;
        const endItem = Math.min((paginationData.currentPage + 1) * paginationData.size, paginationData.totalElements);
        paginationInfo.innerHTML = `<i class="fa-solid fa-info-circle me-2"></i>Hiển thị ${startItem}-${endItem} trong tổng số ${paginationData.totalElements} đơn hàng`;
      }
    }

    function generatePagination(paginationData) {
      const paginationContainer = document.querySelector('.pagination');
      if (!paginationContainer || !paginationData.totalPages) return;

      paginationContainer.innerHTML = '';

      const currentPage = paginationData.currentPage;
      const totalPages = paginationData.totalPages;

      // Previous button
      const prevLi = document.createElement('li');
      prevLi.className = `page-item ${paginationData.first ? 'disabled' : ''}`;
      prevLi.innerHTML = `
        <a class="page-link" href="#" onclick="${paginationData.first ? 'return false;' : 'goToPreviousPage(); return false;'}" tabindex="-1">
            <i class="fa-solid fa-angle-left"></i>
        </a>
    `;
      paginationContainer.appendChild(prevLi);

      // Page numbers
      const maxVisiblePages = 5;
      let startPage = Math.max(0, currentPage - Math.floor(maxVisiblePages / 2));
      let endPage = Math.min(totalPages - 1, startPage + maxVisiblePages - 1);

      // Adjust start page if we're near the end
      if (endPage - startPage < maxVisiblePages - 1) {
        startPage = Math.max(0, endPage - maxVisiblePages + 1);
      }

      // First page if not visible
      if (startPage > 0) {
        const firstLi = document.createElement('li');
        firstLi.className = 'page-item';
        firstLi.innerHTML = `<a class="page-link" href="#" onclick="goToPage(0); return false;">1</a>`;
        paginationContainer.appendChild(firstLi);

        if (startPage > 1) {
          const ellipsisLi = document.createElement('li');
          ellipsisLi.className = 'page-item';
          ellipsisLi.innerHTML = `<span class="page-link">...</span>`;
          paginationContainer.appendChild(ellipsisLi);
        }
      }

      // Visible page numbers
      for (let i = startPage; i <= endPage; i++) {
        const li = document.createElement('li');
        li.className = `page-item ${i === currentPage ? 'active' : ''}`;
        li.innerHTML = `<a class="page-link" href="#" onclick="goToPage(${i}); return false;">${i + 1}</a>`;
        paginationContainer.appendChild(li);
      }

      // Last page if not visible
      if (endPage < totalPages - 1) {
        if (endPage < totalPages - 2) {
          const ellipsisLi = document.createElement('li');
          ellipsisLi.className = 'page-item';
          ellipsisLi.innerHTML = `<span class="page-link">...</span>`;
          paginationContainer.appendChild(ellipsisLi);
        }

        const lastLi = document.createElement('li');
        lastLi.className = 'page-item';
        lastLi.innerHTML = `<a class="page-link" href="#" onclick="goToPage(${totalPages - 1}); return false;">${totalPages}</a>`;
        paginationContainer.appendChild(lastLi);
      }

      // Next button
      const nextLi = document.createElement('li');
      nextLi.className = `page-item ${paginationData.last ? 'disabled' : ''}`;
      nextLi.innerHTML = `
        <a class="page-link" href="#" onclick="${paginationData.last ? 'return false;' : 'goToNextPage(); return false;'}">
            <i class="fa-solid fa-angle-right"></i>
        </a>
    `;
      paginationContainer.appendChild(nextLi);
    }

                            <strong>Email:</strong>

      } catch (error) {

    // Event Listeners
    document.addEventListener('DOMContentLoaded', function () {
      try {
        // Check authentication and permissions on page load
        checkAdminPermission();

        // Load initial data
        loadOrderStatuses();
        loadOrders();

        // Add event listeners for filters
        const phoneInput = document.querySelector('input[placeholder="Nhập số điện thoại"]');
        const nameInput = document.querySelector('input[placeholder="Nhập tên khách hàng"]');
        const addressInput = document.querySelector('input[placeholder="Nhập địa chỉ"]');
        const statusSelect = document.getElementById('selectStatusFilter');

        // Add debounced search for text inputs
        let searchTimeout;
        const searchInputs = [phoneInput, nameInput, addressInput];

        searchInputs.forEach(input => {
          if (input) {
            input.addEventListener('input', function () {
              clearTimeout(searchTimeout);
              searchTimeout = setTimeout(() => {
                currentPage = 0; // Reset to first page
                loadOrders();
              }, 500); // 500ms debounce
            });
          }
        });

        // Add immediate search for status select
        if (statusSelect) {
          statusSelect.addEventListener('change', function () {
            currentPage = 0; // Reset to first page
            loadOrders();
          });
        }

        // Add event listener for entries per page
        const entriesSelect = document.querySelector('.entries-select');
        if (entriesSelect) {
          entriesSelect.addEventListener('change', function () {
            currentPageSize = parseInt(this.value);
            currentPage = 0; // Reset to first page
            loadOrders();
          });
        }

      } catch (error) {
        console.error('Initialization error:', error);
        alert('Lỗi khởi tạo: ' + error.message);
        // Redirect to login page or show error message
        window.location.href = './login.html';
      }
    });

    // Pagination functions
    function goToPage(page) {
      currentPage = page;
      loadOrders();
    }

    function goToPreviousPage() {
      if (currentPage > 0) {
        currentPage--;
        loadOrders();
      }
    }

    function goToNextPage() {
      currentPage++;
      loadOrders();
    }

    function closeModalView() {
      const modal = document.getElementById("productModal");
      if (modal) {
        modal.style.display = "none";
      }
    }
  </script>
